name: Haskell CI

on:
  - push
  - pull_request

jobs:
  ghc-i386:
    runs-on: ubuntu-latest
    container:
      image: i386/ubuntu:bionic
    steps:
      - name: Install GHCup dependencies
        run: |
          apt-get update -y
          apt-get install -y autoconf build-essential zlib1g-dev libgmp-dev curl libncurses5 libtinfo5 libncurses5-dev libtinfo-dev
          curl --proto '=https' --tlsv1.2 -sSf https://get-ghcup.haskell.org | BOOTSTRAP_HASKELL_NONINTERACTIVE=1 BOOTSTRAP_HASKELL_INSTALL_NO_STACK=1 sh
      - uses: actions/checkout@v1 # newer version don't work
      - name: Build
        run: |
          source ~/.ghcup/env
          cabal --version
          cabal update
          cabal build

  ghc-js:
    runs-on: ubuntu-latest
    env:
      version: javascript-unknown-ghcjs-9.12.2
    steps:
      - name: Install emscripten & GHC
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest
          source ./emsdk_env.sh
          emconfigure ghcup install ghc --set ${{ env.version }}
      - name: Build
        run: cabal --with-compiler=javascript-unknown-ghcjs-ghc --with-hc-pkg=javascript-unknown-ghcjs-ghc-pkg build

  ghc-wasm:
    runs-on: ubuntu-latest
    env:
      version: wasm32-wasi-9.12.2.20250327
    steps:
      - name: Install WASM toolchain
        run: |
          git clone https://gitlab.haskell.org/ghc/ghc-wasm-meta.git
          cd ghc-wasm-meta/
          export SKIP_GHC=yes
          ./setup.sh
          source ~/.ghc-wasm/env
      - name: Install GHC
        run: |
          ghcup config add-release-channel https://raw.githubusercontent.com/haskell/ghcup-metadata/develop/ghcup-cross-0.0.9.yaml
          ghcup install ghc --set ${{ env.version }} -- --host=x86_64-linux --with-intree-gmp --with-system-libffi
      - name: Build
        run: cabal --with-compiler=wasm32-wasi-ghc --with-hc-pkg=wasm32-wasi-ghc-pkg build
